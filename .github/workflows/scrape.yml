name: Scrape Polymarket Leaderboard

on:
  schedule:
    # Runs every hour at minute 0
    - cron: '0 * * * *'
  workflow_dispatch:  # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        run: python polymarket_scraper.py

      - name: Commit updated data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Polymarket Scraper Bot"
          git add polymarket_wallets.json
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "Update leaderboard data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
