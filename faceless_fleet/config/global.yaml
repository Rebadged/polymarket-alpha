# Global fleet settings shared by every channel.
# Channel-specific files in config/channels/*.yaml override these.

paths:
  # All work happens under faceless_fleet/output (gitignored).
  output_root: output
  # Stage folders (the human review gate lives between pending_review and approved).
  raw: output/raw                 # fresh model outputs (stills, clips, audio)
  pending_review: output/pending_review  # assembled videos awaiting your approval
  approved: output/approved       # approved, queued for upload
  published: output/published     # uploaded, with the YouTube video id recorded

generation:
  # Default Higgsfield models (verified live via models_explore, 2026-06).
  # Stills: z_image = fast/budget; recraft-v4-1 = photoreal premium.
  image_model: soul_2            # validated: stylized painterly cozy look
  video_model: kling3_0_turbo    # validated: cheap (~7.5 cr) locked-camera animator
  video_resolution: 720p
  clip_seconds: 10               # 10s source clip (less perceptible video loop); ffmpeg loops to hours
  est_credits_per_clip: 8        # ~0.1 image + ~7.5 video; used for batch budgeting
  aspect_ratio: "16:9"
  # 'manifest' = emit a JSON job for a Claude Code/MCP session to fulfill (works today,
  # MCP-only, no API key). 'rest' = call the Higgsfield Cloud API unattended (needs key).
  backend: manifest
  # --- Cloud API (backend: rest) only --------------------------------------------
  # The Cloud API uses fal-style slugs that DIFFER from the MCP names above. Confirm
  # the exact slugs against the live key (one lookup), then set them here. When unset,
  # rest.py falls back to image_model/video_model — which are MCP names and will NOT
  # resolve on the Cloud API, so these must be filled before `restock-run` works.
  rest_image_model:                # e.g. "higgsfield/soul/text-to-image" (CONFIRM)
  rest_video_model:                # e.g. "higgsfield/kling-3-turbo/image-to-video" (CONFIRM)
  rest_image_resolution: "2K"

assembly:
  fps: 30
  width: 1920
  height: 1080
  # Ken Burns slow-zoom applied to stills before/instead of motion clips.
  kenburns_zoom_per_frame: 0.0005
  kenburns_max_zoom: 1.5
  crossfade_seconds: 3
  # Narration mixed over the music bed at this gain (0.35 works for sleep).
  bed_gain_under_narration: 0.35
  # Seamless looping (research's #1 retention lever): crossfade the short clip's
  # end into its start so the loop seam is invisible/inaudible across hours.
  loop_video_xfade_seconds: 0.5   # ~short video crossfade masks the visual seam
  loop_audio_xfade_seconds: 0.4   # equal-power audio crossfade hides the bed seam
  # LOUDNESS POLICY (startle-proof + consistent across every video):
  #  - target -14 LUFS = YouTube's own normalization point, so our videos play at
  #    the SAME loudness as everything else -> viewers never adjust volume between
  #    videos (the thing that causes a later video to startle them awake).
  #  - true-peak hard cap so no transient (a thunderclap) ever spikes.
  #  - low loudness-range = tight dynamics, nothing swells louder than the bed.
  default_loudness_lufs: -14
  loudness_true_peak: -1.5       # dBTP hard ceiling
  loudness_range: 6              # LU; lower = flatter/more consistent (no swells)
  # Loop illusion: the mixed bed unit is this long before it repeats. Longer +
  # long source files (>40s) makes the loop point imperceptible over hours.
  bed_unit_seconds: 480          # 8 min

upload:
  # Anti-spam: drip-publish, never bulk-drop. publishAt gets per-video jitter.
  privacy_status: private        # flips public automatically at publishAt
  notify_subscribers: false
  category_id: "10"              # Music
  base_publish_hour_utc: 2       # nominal slot; jitter widens it
  jitter_minutes: 50             # +/- random offset around the base slot
  min_hours_between_uploads: 20  # human-plausible cadence per channel

# The zero-touch loop (pipeline/auto.py). Stocked occasionally (clip batch + SFX),
# then runs itself on a jittered cron.
auto:
  clips_dir: assets/clips        # per-channel subfolder of pre-generated clips
  default_variant: "8h"
  auto_approve: true             # skip the manual gate; uploads go private+publishAt
                                 # (the scheduled-private window is your safety net)
  publish: true                  # actually upload in the loop

policy:
  # YouTube July 2025 "inauthentic content" guardrails enforced by review.py.
  require_distinct_from_last: true   # block near-duplicate scene+track+title
  ai_disclosure_default: false       # ambient art is exempt; narration w/ real-looking people = true
