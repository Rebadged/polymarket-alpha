# Fleet channel — Tent / Camping (focal_point: tent)
# The vibe: tucked inside a warm tent while it rains/snows outside.
# NAME is a placeholder — confirm + check @handle availability before creating.

channel:
  slug: camping_tent
  name: "Tent Comforts"                # "[Focal] Comforts" family for cross-linking
  focal_point: tent
  lane: tent_cozy
  youtube_handle: "@TentComforts"
  youtube_channel_id: ""
  oauth_secret_env: YT_TENT_REFRESH_TOKEN
  bio: "Cozy camping ambience for sleep and relaxation. Rain drumming on the tent, a warm lantern glow, a campfire just outside, and quiet nights in the wild. Crawl in, get warm, and let the rain carry you off. New ambiences every week."
  language: en
  audience_geo_hint: "US/UK/CA/AU"

identity:
  mood: "warm and dry inside a glowing tent while it rains in the forest outside"
  palette: ["#0a1422", "#16263a", "#2a3a2a", "#c89030", "#e8c060"]
  film_look: "cinematic stylized painterly realism, idealized cozy, shot on film, warm lantern glow vs cool night, shallow depth of field, subtle grain, 16:9"
  negative: "no people, no text on any surface, no signage, no labels, no clutter, minimal objects, no foreground tree trunks, no dark vertical trunks framing the shot, no warped geometry, no melting objects, no watermarks, no logos, no fast or jarring motion"
  motion_principle: "camera locked and static; the falling rain/snow + flickering lantern are the motion that loops"

scene_pool:
  - id: tent_rain
    weather: rain
    keyword: "Heavy Rain on a Tent"
    audio_hint: "rain on tent canvas + light wind"
    audio_layers: [{el: rain_tent, gain: 1.0}, {el: wind, gain: 0.25}]
    still_prompt: "a cozy camping tent glowing warmly from a lantern inside, pitched in an open forest clearing at night, heavy rain falling, tall dark pines set back as a backdrop, wet ground reflecting the warm tent glow, deep blue rainy night, {film_look}"
    motion_prompt: "heavy rain falling steadily and continuously, the warm tent glow flickering gently like a lantern inside, rain running down the tent canvas, {motion_principle}, no people"
  - id: tent_campfire
    weather: clear
    keyword: "Tent & Campfire Night"
    audio_hint: "campfire crackle + crickets + faint wind"
    audio_layers: [{el: fireplace, gain: 0.9}, {el: crickets, gain: 0.3}, {el: wind, gain: 0.2}]
    still_prompt: "a glowing camping tent beside a small warm campfire in an open forest clearing at night under the stars, dark pines set back, open foreground, deep blue night, cozy, {film_look}"
    motion_prompt: "the campfire flames dancing beside the tent, the tent glowing warmly and flickering, embers drifting up, faint star twinkle, {motion_principle}, no people"
  - id: tent_lakeside_stars
    weather: clear
    keyword: "Tent by the Lake Under the Stars"
    audio_hint: "gentle lake water + crickets + faint wind"
    audio_layers: [{el: water, gain: 0.5}, {el: crickets, gain: 0.3}, {el: wind, gain: 0.2}]
    still_prompt: "a warmly glowing camping tent on the shore of a calm lake at night under a sky full of stars, the tent glow reflecting on the still water, dark pine forest behind, deep blue night, {film_look}"
    motion_prompt: "the warm tent glow flickering gently, its reflection shimmering on the calm rippling lake, faint star twinkle, {motion_principle}, serene, no people"
  - id: tent_snow
    weather: snow
    keyword: "Snowy Tent & Winter Wind"
    audio_hint: "soft winter wind + faint lantern; NO rain"
    audio_layers: [{el: wind, gain: 0.6}, {el: fireplace, gain: 0.3}]
    still_prompt: "a warmly glowing camping tent pitched in a snowy forest clearing at night, snow falling softly, tall snow-laden pines set back, open snow foreground reflecting the warm glow, deep blue night, {film_look}"
    motion_prompt: "snow falling steadily and softly around the tent, the warm tent glow flickering gently, {motion_principle}, serene, no people"

location_pool:
  - {title: "Pacific Northwest", prompt: "in the Pacific Northwest pine forest"}
  - {title: "Canadian Rockies", prompt: "in the Canadian Rockies"}
  - {title: "Scottish Highlands", prompt: "in the Scottish Highlands"}
  - {title: "Norwegian Forest", prompt: "by a fjord in a Norwegian forest"}

weather_map:
  rain:  {season: any,    playlist: "Rain on the Tent"}
  clear: {season: any,    playlist: "Camping Under the Stars"}
  snow:  {season: winter, playlist: "Snowy Camping Nights"}
playlists:
  - "Rain on the Tent"
  - "Camping Under the Stars"
  - "Snowy Camping Nights"
  - "8-Hour Camping Ambience"

audio:
  bed_source: file
  bed_file: ""
  loudness_lufs: -14
  sfx_dir: assets/sfx
  sfx_library:
    rain_tent: rain_on_tent.wav
    fireplace: fireplace.wav
    wind: wind_winter.wav
    crickets: crickets.wav
    water: lake_water.wav

longform:
  variants: ["1h", "3h", "8h"]
  seamless_loop: true

metadata:
  title_templates:
    - "{keyword} for Deep Sleep | {location} | {dur}"
    - "{keyword} Sounds for Sleeping | {location} | {dur}"
    - "{keyword} | {location} | {dur} (No Mid-Roll Ads)"
    - "{keyword} for Sleep & Relaxation | {location} | {dur} (Cinematic)"
  description: |
    Welcome to Tent & Rain. ⛺🌧️ Rain on the tent, a warm lantern glow, the quiet of the forest — for deep sleep, studying, or relaxing.
    No interruptions while you drift off. New ambiences every week.

    ▶ Playlists: Rain on the Tent · Camping Under the Stars · Snowy Camping Nights

    #rainontent #camping #rainsounds #sleepsounds #ambience #cozy #nature
  tags: ["rain on tent", "camping sounds", "rain sounds", "sleep sounds", "tent rain", "camping ambience", "rain for sleeping", "nature sounds"]
  made_for_kids: false
  ai_disclosure: false

ads:
  pre_roll: true
  mid_rolls: false
  post_roll: false

cadence:
  uploads_per_week: 3
  shorts_per_week: 5
