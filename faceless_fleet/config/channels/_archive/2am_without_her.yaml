# Channel 1 — "2am without her."   (trailing period is part of the brand)
# Validated, live channel. Modeled after "i miss her." Aesthetic: purple ambient
# night, a consistent "girl" character, lo-fi warmth. Audience: young men who
# miss someone / can't sleep.  This config = the proven 2am template.

channel:
  slug: 2am_without_her
  name: "2am without her."
  lane: ambient_sleep_emotional
  youtube_handle: "@2amWithoutHer"
  youtube_channel_id: ""           # UC... — fill once known
  oauth_secret_env: YT_2AM_REFRESH_TOKEN
  bio: "music for 2am when you can't stop thinking about her"
  language: en
  audience_geo_hint: "US/UK/CA/AU"

identity:
  mood: "lonely, longing, nocturnal, 3am-nostalgia; missing her, can't sleep"
  palette: ["#1a1033", "#2a1a4a", "#3a2f6b", "#5b4b8a", "#c98b6b"]   # purple/blue night + warm lamp
  film_look: "shot on 35mm film, purple and blue ambient night lighting, subtle grain"
  # The girl is the visual anchor — appears in EVERY image, described verbatim.
  character: "young woman with dark brown wavy hair, hoop earrings, delicate necklace, natural freckles"
  # Hard image rules (proven). Injected as the negative on every still.
  negative: "no visible text on any surface, no signage, no book titles, no labels, no screens with words, no warped hands, no extra fingers, no melting objects, no watermarks, no logos, no heavy VHS/scanline filter"

# Scene pool — each is the girl in a night scene. generate.py rotates these so no
# two videos repeat (YouTube inauthentic-content rule). All photoreal candid 35mm.
scene_pool:
  - id: rainy_balcony
    still_prompt: "Photorealistic candid photo of {character}, standing on a rainy apartment balcony at night wrapped in a soft cardigan, blurred city lights and rain behind her, looking out wistfully, {film_look}, melancholic and intimate"
    motion_prompt: "extremely slow gentle push-in, rain falling softly behind her, her hair barely moving in the breeze, calm and still, cinematic 35mm, no sudden motion"
  - id: window_lamp
    still_prompt: "Photorealistic candid photo of {character}, sitting by a rain-streaked window beside a warm amber lamp at 2am, resting her chin on her hand, looking down quietly, {film_look}, lonely and warm"
    motion_prompt: "barely-perceptible slow drift toward the window, rain trickling down the glass, lamp glow flickering softly, her gaze steady, gentle and quiet"
  - id: rooftop_skyline
    still_prompt: "Photorealistic candid photo of {character}, sitting on a rooftop at night with a purple city skyline behind her, knees pulled up, lost in thought, {film_look}, wistful and cinematic"
    motion_prompt: "slow subtle parallax across the skyline, distant lights twinkling, faint wind in her hair, calm nocturnal mood, no fast movement"
  - id: bed_moonlight
    still_prompt: "Photorealistic candid photo of {character}, lying awake in bed at night, moonlight and faint purple city glow through the blinds, staring at the ceiling, {film_look}, sleepless and tender"
    motion_prompt: "very slow vertical drift, soft shift of moonlight as a cloud passes, her breathing barely visible, deeply calm, no people moving in frame"

audio:
  # Suno has NO official API -> music stays MANUAL (ToS-safe). Drop the WAV path
  # here, or let the test use a Higgsfield ambient bed as a stand-in.
  bed_source: file                 # 'file' (Suno WAV) | 'higgsfield_native' (test/stand-in)
  bed_file: ""                     # e.g. faceless_fleet/output/raw/2am_without_her/suno_bed.wav
  # Validated Suno seed (use in the Suno web app, download WAV, point bed_file here):
  bed_prompt: "Downtempo ambient lo-fi, 78 BPM, F# minor. Gentle Rhodes electric piano with heavy reverb and slow chord changes. Distant chopped female vocal sample pitched down, echoing softly. Warm tape saturation, vinyl noise, deep sub tone. No percussion, just a barely audible low-end throb. Dreamy, lonely, like falling asleep mid-thought."

longform:
  # Durations look ORGANIC, never exactly round (proven anti-pattern to avoid).
  target_seconds: 10620            # 2:57:00
  jitter_seconds: 240              # +/- up to 4 min so it lands ~2:53–3:01, never exactly 3:00
  variants: ["sleep"]              # study-with-me lane lives in its own config (see note)

metadata:
  # Lowercase, poetic/longing, ends with a period or ellipsis. NO emojis in titles.
  title_templates:
    - "she felt like home."
    - "i wish you'd call.."
    - "she didn't say goodbye."
    - "i miss the way she looked at me…"
    - "you're still on my mind at 2am."
  description: |
    music for 2am when you can't stop thinking about her. 🌃

    almost 3 hours of slow ambient lo-fi to help you sleep, or just sit with the quiet.
    no mid-rolls — uninterrupted through the night.

    subscribe for a new one every few days. 💜

    #lofi #sleep #ambient #2am #lofihiphop #sad
  tags: ["lofi", "sleep music", "ambient music", "sad lofi", "lofi hip hop", "music for sleeping", "2am", "missing her", "lonely music"]
  made_for_kids: false
  ai_disclosure: false             # stylized artistic ambient — per channel's established posture

ads:
  # Ambient-specific: pre-roll + post-roll ONLY, mid-rolls DISABLED. Preserves the
  # listening experience; overnight autoplay chains stack impressions across videos.
  mid_rolls: false

cadence:
  uploads_per_week: 3              # drip; library-building phase ran ~2/day at 2-3pm & 9-11pm
  preferred_hours_local: [14, 22]  # afternoon + bedtime window
